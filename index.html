<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Owner's Local OS</title>
    <meta name="description" content="The AI-powered operating system for local businesses." />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1F3557" />

    <!-- iOS "Add to Home Screen" support -->
    <link rel="apple-touch-icon" href="/branding/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Owner's Local" />

    <link rel="icon" type="image/png" sizes="32x32" href="/branding/icon-32.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
